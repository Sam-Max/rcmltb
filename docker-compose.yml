services:
  app:
    image: ghcr.io/sam-max/rcmltb:latest
    container_name: rcmltb
    command: bash start.sh
    env_file:
      - ./config.env
    volumes:
      # Downloads folder - ensure host directory has write permissions
      - ./downloads:/usr/src/app/downloads
      # Config persistence (optional) - stores user data, rclone.conf, etc.
      - ./config:/usr/src/app/config
    ports:
      - "80:80" # qbittorrent selection webserver
      - "8080:8080" # rclone serve index webserver
    restart: on-failure
      
      
